<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiPharm - Shopping Cart</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root { --primary-blue: #a4bdf6; }
        * { font-family: 'Poppins', sans-serif; }
        body { background-color: #f8f9fa; padding-bottom: 50px; }

        .bg-custom-blue { background-color: var(--primary-blue); }
        .text-custom-blue { color: var(--primary-blue); }
        
        .qty-box { border: 3px solid var(--primary-blue); border-radius: 10px; }
        .summary-card { border: 6px solid var(--primary-blue); border-radius: 20px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand" href="index.html"><img src="logo_utama.png" alt="Logo" height="35"></a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav gap-4">
                    <li class="nav-item"><a class="nav-link fw-bold text-dark" href="catalog.html">Medications</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark" href="facilities.html">Nearest Health Facility</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark" href="tracking.html">Orders</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark" href="about.html">About</a></li>
                </ul>
            </div>
            
            <a href="cart.html" class="text-custom-blue fs-4 position-relative text-decoration-none ms-auto ms-lg-0 mt-3 mt-lg-0">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="nav-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65rem; display: none;">0</span>
            </a>
        </div>
    </nav>

    <div class="bg-custom-blue py-5">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
                <i class="fa-solid fa-cart-shopping fs-1"></i>
                <h1 class="fw-bolder mb-0">Shopping Cart</h1>
            </div>
            <p class="fw-semibold mb-0 text-end d-none d-md-block" style="max-width: 250px;">Review your items before proceeding to checkout</p>
        </div>
    </div>

    <div class="container py-5">
        <div class="row g-5">
            
            <div class="col-lg-8" id="cart-list">
                </div>
            
            <div class="col-lg-4">
                <div class="card summary-card bg-white shadow-sm p-4">
                    <h4 class="fw-bolder mb-4">Order Summary</h4>
                    
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-muted fw-semibold">Items (<span id="qty-count">0</span>)</span>
                        <span class="fw-bold" id="total-price">IDR 0</span>
                    </div>
                    
                    <hr class="border-secondary border-opacity-25 border-2 border-dashed my-4">
                    
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="fw-bolder fs-5">Total Payment</span>
                        <span class="fw-bolder fs-4 text-custom-blue" id="total-payment">IDR 0</span>
                    </div>
                    
                    <button class="btn btn-dark w-100 fw-bold py-3 rounded-3" onclick="goToCheckout()">Proceed to Checkout</button>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const MASTER_IMAGE = "https://www.icapsulepack.com/wp-content/uploads/2023/04/Drug-and-Medicine-2.jpg";

        function getMasterMeds() {
            let stored = localStorage.getItem('digipharm_master_meds');
            return stored ? JSON.parse(stored) : []; 
        }

        function renderCart() {
            let cart = JSON.parse(localStorage.getItem('digipharm_cart')) || [];
            const listContainer = document.getElementById('cart-list');
            let medicines = getMasterMeds();

            if (cart.length === 0) {
                listContainer.innerHTML = "<h4 class='text-center text-muted mt-5'>Your cart is empty.</h4>";
                document.getElementById('total-price').innerText = "IDR 0";
                document.getElementById('total-payment').innerText = "IDR 0";
                document.getElementById('qty-count').innerText = "0";
                updateNavBadge(0);
                return;
            }

            let total = 0;
            let qtyCount = 0;

            listContainer.innerHTML = cart.map((item, i) => {
                let medInfo = medicines.find(m => m.id.toLowerCase() === item.id.toLowerCase());
                
                let priceString = medInfo ? medInfo.price.toString().replace(/\./g, '') : "10000";
                let harga = parseInt(priceString) || 0; 
                
                let displayName = medInfo ? medInfo.name : item.id;
                let subtotal = harga * item.qty;
                
                total += subtotal;
                qtyCount += item.qty;

                return `
                <div class="d-flex align-items-center py-4 border-bottom">
                    <img src="${MASTER_IMAGE}" class="rounded-4 me-4 object-fit-cover shadow-sm" style="width: 100px; height: 100px;" onerror="this.src='logo_utama.png'">
                    
                    <div class="flex-grow-1">
                        <h5 class="fw-bolder mb-1 text-capitalize">${displayName}</h5>
                        <p class="text-muted fw-semibold mb-0">IDR ${harga.toLocaleString('id-ID')}</p>
                    </div>
                    
                    <div class="d-flex align-items-center qty-box px-2 py-1 me-4 bg-white">
                        <button class="btn btn-sm text-dark fw-bolder fs-5 border-0 px-2" onclick="updateQty(${i}, -1)">-</button>
                        <span class="fw-bolder fs-6 px-3">${item.qty}</span>
                        <button class="btn btn-sm text-dark fw-bolder fs-5 border-0 px-2" onclick="updateQty(${i}, 1)">+</button>
                    </div>
                    
                    <button class="btn btn-link text-danger p-0 fs-4" onclick="updateQty(${i}, -${item.qty})">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>`;
            }).join('');

            document.getElementById('total-price').innerText = "IDR " + total.toLocaleString('id-ID');
            document.getElementById('total-payment').innerText = "IDR " + total.toLocaleString('id-ID');
            document.getElementById('qty-count').innerText = qtyCount;
            updateNavBadge(qtyCount);
        }

        function updateQty(index, delta) {
            let cart = JSON.parse(localStorage.getItem('digipharm_cart')) || [];
            cart[index].qty += delta;
            if (cart[index].qty < 1) {
                cart.splice(index, 1);
            }
            localStorage.setItem('digipharm_cart', JSON.stringify(cart));
            renderCart();
        }

        function updateNavBadge(totalQty) {
            const badge = document.getElementById('nav-badge');
            if (badge) {
                badge.innerText = totalQty;
                badge.style.setProperty('display', totalQty > 0 ? 'block' : 'none', 'important');
            }
        }

        function goToCheckout() {
            let cart = JSON.parse(localStorage.getItem('digipharm_cart')) || [];
            if (cart.length === 0) {
                alert("Cart is empty! Please add some medications first.");
                return;
            }
            window.location.href = 'checkout.html';
        }

        window.onload = renderCart;
        window.addEventListener('storage', renderCart);
    </script>
</body>
</html>
