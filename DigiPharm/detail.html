<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiPharm - Detail</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root { --primary-blue: #a4bdf6; }
        * { font-family: 'Poppins', sans-serif; }
        body { background-color: #f8f9fa; padding-bottom: 50px; }
        .bg-custom-blue { background-color: var(--primary-blue); }
        .text-custom-blue { color: var(--primary-blue); }
        .icon-box { 
            width: 50px; height: 50px; 
            background-color: var(--primary-blue); 
            border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; color: #000;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand" href="index.html"><img src="logo_utama.png" alt="DigiPharm Logo" height="35"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav gap-4">
                    <li class="nav-item"><a class="nav-link fw-bold text-dark" href="catalog.html">Medications</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark" href="facilities.html">Nearest Health Facility</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark" href="tracking.html">Orders</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark" href="about.html">About</a></li>
                </ul>
            </div>
            <a href="cart.html" class="text-dark fs-4 position-relative text-decoration-none ms-auto ms-lg-0 mt-3 mt-lg-0">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="nav-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65rem; display: none;">0</span>
            </a>
        </div>
    </nav>

    <div class="container py-5 mt-4">
        <div class="row align-items-center g-5 bg-white p-4 p-md-5 rounded-5 shadow-sm border" style="border-color: #eee !important;">
            <div class="col-lg-5 text-center">
                <img id="img" src="https://www.icapsulepack.com/wp-content/uploads/2023/04/Drug-and-Medicine-2.jpg" alt="Medicine" class="img-fluid rounded-4 shadow-sm" style="max-width: 400px; width: 100%; object-fit: cover;">
            </div>

            <div class="col-lg-7">
                <h1 id="name" class="display-5 fw-bolder mb-2 text-capitalize">---</h1>
                <h2 id="price" class="fw-bolder text-custom-blue mb-4">IDR ---</h2>
                
                <p class="fs-5 text-muted mb-4" style="text-align: justify;">
                    Order medications online with ease. Fast delivery, quality products, and professional pharmaceutical service.
                </p>

                <hr class="mb-4">

                <div class="d-flex align-items-start mb-4">
                    <div class="icon-box me-3"><i class="fa-solid fa-pills"></i></div>
                    <div>
                        <h5 class="fw-bolder mb-1">Dosage</h5>
                        <p id="dose" class="text-muted fw-semibold mb-0">---</p>
                    </div>
                </div>

                <div class="d-flex align-items-start mb-4">
                    <div class="icon-box me-3"><i class="fa-solid fa-clipboard-list"></i></div>
                    <div>
                        <h5 class="fw-bolder mb-1">Usage Instructions</h5>
                        <p id="instruction" class="text-muted fw-semibold mb-0">---</p>
                    </div>
                </div>

                <div class="d-flex align-items-start mb-5">
                    <div class="icon-box me-3"><i class="fa-solid fa-triangle-exclamation"></i></div>
                    <div>
                        <h5 class="fw-bolder mb-1">Important Warnings</h5>
                        <p id="warning" class="text-muted fw-semibold mb-0">---</p>
                    </div>
                </div>

                <div class="d-flex gap-3">
                    <button id="add-to-cart-btn" class="btn btn-dark fw-bold px-5 py-3 rounded-3 flex-grow-1 fs-5 text-uppercase" onclick="addToCart()">
                        <i class="fa-solid fa-cart-plus me-2"></i>Add to Cart
                    </button>
                    <a href="catalog.html" class="btn btn-outline-dark fw-bold px-4 py-3 rounded-3 fs-5">
                        Back
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let currentItemId = 'paracetamol'; 

        function getMasterMeds() {
            let stored = localStorage.getItem('digipharm_master_meds');
            return stored ? JSON.parse(stored) : []; 
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const idParam = urlParams.get('item');
            
            let medicines = getMasterMeds();
            let stockData = JSON.parse(localStorage.getItem('digipharm_stock')) || {};
            
            let data = medicines.find(m => m.id.toLowerCase() === (idParam || 'paracetamol').toLowerCase());
            
            if (!data) {
                data = { id: 'paracetamol', name: 'Paracetamol', price: '10.000' };
            }

            currentItemId = data.id;
            document.getElementById('name').innerText = data.name;
            document.getElementById('price').innerText = "IDR " + data.price;
            
            let finalDose = data.dose || '';
            let finalInstruction = data.instruction || '';
            let finalWarning = data.warning || '';
            
            if (!finalDose || !finalInstruction || !finalWarning) {
                let medName = data.name.toLowerCase();
                
                let defaultDose = 'Standard Dose / Tablet';
                let defaultInstruction = 'Use as directed by a healthcare professional or pharmacist.';
                let defaultWarning = 'Consult a doctor if symptoms persist or if you have specific medical conditions.';

                if (medName.includes('betadine') || medName.includes('salep') || medName.includes('cream')) {
                    defaultDose = 'Apply as needed';
                    defaultInstruction = 'Apply topically to the affected area. Do NOT ingest or swallow.';
                    defaultWarning = 'For external use only. Avoid contact with eyes or open deep wounds.';
                } 
                else if (medName.includes('sirup') || medName.includes('syrup')) {
                    defaultDose = '1-2 tablespoons';
                    defaultInstruction = 'Take using a measuring spoon as directed. Shake well before use.';
                    defaultWarning = 'Do not exceed the recommended daily dose. Keep out of reach of children.';
                } 
                else if (medName.includes('paracetamol') || medName.includes('ibuprofen') || medName.includes('mefenamic') || medName.includes('panadol')) {
                    defaultDose = '1 Tablet';
                    defaultInstruction = 'Take 1 tablet every 4-6 hours for fever or pain. Max 8 tablets per day. Take after meals.';
                    defaultWarning = 'Caution for patients with liver or kidney impairment.';
                }
                else if (medName.includes('cetirizine') || medName.includes('loratadine')) {
                    defaultDose = '1 Tablet daily';
                    defaultInstruction = 'Take one tablet daily. Best taken in the evening.';
                    defaultWarning = 'May cause drowsiness. Avoid driving or operating heavy machinery after taking.';
                }
                else if (medName.includes('guaifenesin') || medName.includes('dextro')) {
                    defaultDose = '1 Tablet every 4-6 hours';
                    defaultInstruction = 'Drink plenty of water to help loosen mucus. Do not chew or crush.';
                    defaultWarning = 'Consult a doctor if cough lasts for more than 7 days.';
                }
                else if (medName.includes('omeprazole') || medName.includes('promag')) {
                    defaultDose = '1 Tablet';
                    defaultInstruction = 'Take 30-60 minutes BEFORE meals. Chew thoroughly before swallowing (for antacids).';
                    defaultWarning = 'Do not take with dairy products or other medications at the exact same time.';
                }
                else if (medName.includes('amoxicillin')) {
                    defaultDose = '1 Tablet, 3 times a day';
                    defaultInstruction = 'Take after meals. You MUST complete the entire course of this medication.';
                    defaultWarning = 'Do not skip doses. Stop and consult a doctor if severe allergic reactions occur.';
                }
                else if (medName.includes('vitamin')) {
                    defaultDose = '1 Tablet daily';
                    defaultInstruction = 'Take once a day preferably after breakfast to enhance absorption.';
                    defaultWarning = 'High doses may cause stomach upset. Drink plenty of water.';
                }

                if (!finalDose) finalDose = defaultDose;
                if (!finalInstruction) finalInstruction = defaultInstruction;
                if (!finalWarning) finalWarning = defaultWarning;
            }

            document.getElementById('dose').innerText = finalDose;
            document.getElementById('instruction').innerText = finalInstruction;
            document.getElementById('warning').innerText = finalWarning;

            let isAvailable = stockData[currentItemId] !== undefined ? stockData[currentItemId] : true;
            if (!isAvailable) {
                const btn = document.getElementById('add-to-cart-btn');
                btn.innerText = "Out of Stock";
                btn.className = "btn btn-secondary fw-bold px-5 py-3 rounded-3 flex-grow-1 fs-5 text-uppercase";
                btn.disabled = true;
                document.getElementById('img').style = "filter: grayscale(100%); opacity: 0.6; max-width: 400px; width: 100%; object-fit: cover;";
            }
            
            updateBadge();
        };

        function addToCart() {
            let cart = JSON.parse(localStorage.getItem('digipharm_cart')) || [];
            let existingItem = cart.find(item => item.id.toLowerCase() === currentItemId.toLowerCase());

            if (existingItem) {
                existingItem.qty += 1;
            } else {
                cart.push({ id: currentItemId, qty: 1 });
            }

            localStorage.setItem('digipharm_cart', JSON.stringify(cart));
            updateBadge();
            alert(document.getElementById('name').innerText + " added to cart!");
        }

        function updateBadge() {
            let cart = JSON.parse(localStorage.getItem('digipharm_cart')) || [];
            let total = cart.reduce((sum, item) => sum + (parseInt(item.qty) || 0), 0);
            
            const badge = document.getElementById('nav-badge');
            if (badge) {
                badge.innerText = total;
                badge.style.setProperty('display', total > 0 ? 'block' : 'none', 'important');
            }
        }
    </script>
</body>
</html>
