<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiPharm - Order Tracking</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root { --primary-blue: #a4bdf6; }
        * { font-family: 'Poppins', sans-serif; }
        body { background-color: #f8f9fa; padding-bottom: 50px; }

        .bg-custom-blue { background-color: var(--primary-blue); }
        .text-custom-blue { color: var(--primary-blue); }
        
        .order-card { border: 6px solid var(--primary-blue); border-radius: 15px; overflow: hidden; background: white; }
        .status-header { border-bottom: 6px solid var(--primary-blue); background-color: #fcfcfc; }
        
        .timeline { border-left: 3px solid #dee2e6; padding-left: 20px; margin: 20px 0; }
        .time-item { position: relative; margin-bottom: 15px; }
        .time-item::before { content: ''; position: absolute; left: -26px; top: 6px; width: 10px; height: 10px; background: #dee2e6; border-radius: 50%; }
        .time-item.active::before { background: var(--primary-blue); box-shadow: 0 0 8px var(--primary-blue); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand" href="index.html"><img src="logo_utama.png" alt="Logo" height="35"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav gap-4">
                    <li class="nav-item"><a class="nav-link fw-bold text-dark" href="catalog.html">Medications</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark" href="facilities.html">Nearest Health Facility</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-custom-blue" href="tracking.html">Orders</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark" href="about.html">About</a></li>
                </ul>
            </div>
            <a href="cart.html" class="text-dark fs-4 position-relative text-decoration-none ms-auto ms-lg-0 mt-3 mt-lg-0">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="nav-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65rem; display: none;">0</span>
            </a>
        </div>
    </nav>

    <div class="bg-custom-blue py-5">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
            <div>
                <h1 class="fw-bolder mb-0">Order Tracking</h1>
            </div>
            <p class="fw-semibold mb-0 mt-2 mt-md-0 text-md-end">Monitor your orders in real-time</p>
        </div>
    </div>

    <div class="container py-5" style="max-width: 900px;" id="list">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function getMasterMeds() {
            let stored = localStorage.getItem('digipharm_master_meds');
            return stored ? JSON.parse(stored) : []; 
        }

        function renderTracking() {
            const history = JSON.parse(localStorage.getItem('digipharm_history')) || [];
            const container = document.getElementById('list');
            let medicines = getMasterMeds();

            if (history.length === 0) {
                container.innerHTML = "<div class='text-center text-muted mt-5'><h3>No active orders.</h3><p>Your tracking history will appear here once you place an order.</p></div>";
                return;
            }

            container.innerHTML = history.map((order, idx) => {
                const currentStatus = order.status || 'Packing';
                const isDispatchedActive = (currentStatus === 'Medicine Dispatched' || currentStatus === 'Ready for Collection');
                const isReadyActive = (currentStatus === 'Ready for Collection');

                return `
                <div class="mb-5">
                    <div class="d-flex justify-content-between align-items-end mb-3 px-2">
                        <div>
                            <h3 class="fw-bolder mb-0">${order.id}</h3>
                            <small class="text-muted fw-semibold">${order.date}</small>
                        </div>
                        <div class="fw-bolder fs-4">
                            IDR ${order.total.toLocaleString('id-ID')}
                        </div>
                    </div>
                    
                    <div class="order-card shadow-sm">
                        <div class="status-header p-4 p-md-5">
                            <h2 class="fw-bolder display-6 mb-4">${currentStatus}</h2>
                            <div class="timeline">
                                <div class="time-item active">
                                    <h6 class="fw-bold mb-0">Order placed</h6>
                                    <small class="text-muted">${order.date}</small>
                                </div>
                                <div class="time-item ${isDispatchedActive ? 'active' : ''}">
                                    <h6 class="fw-bold mb-0">Medicine Dispatched</h6>
                                    <small class="text-muted">${isDispatchedActive ? 'Out for delivery / Dispatched' : 'In progress...'}</small>
                                </div>
                                <div class="time-item ${isReadyActive ? 'active' : ''}">
                                    <h6 class="fw-bold mb-0">Ready</h6>
                                    <small class="text-muted">${isReadyActive ? 'Your order is ready!' : 'Pending'}</small>
                                </div>
                            </div>
                            <div class="fw-bold d-flex align-items-center mt-4">
                                <i class="fa-solid fa-location-dot me-2 text-danger"></i> 
                                ${order.deliveryMethod || 'Pickup at Pharmacy'} 
                            </div>
                        </div>
                        
                        <div class="p-4 p-md-5">
                            <h5 class="fw-bolder mb-4">Purchased Items</h5>
                            ${order.items.map(item => {
                                let match = medicines.find(m => m.id.toLowerCase() === item.id.toLowerCase());
                                
                                let priceString = match ? match.price.toString().replace(/\./g, '') : "10000";
                                let price = parseInt(priceString) || 0;
                                
                                let displayName = match ? match.name : item.id;
                                
                                return `
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="d-flex align-items-center">
                                        <img src="https://www.icapsulepack.com/wp-content/uploads/2023/04/Drug-and-Medicine-2.jpg" class="rounded-3 shadow-sm me-3" style="width: 70px; height: 70px; object-fit: cover;">
                                        <div>
                                            <h6 class="fw-bolder text-capitalize mb-1">${displayName}</h6>
                                            <small class="text-muted fw-bold">Qty: ${item.qty}</small>
                                        </div>
                                    </div>
                                    <div class="fw-bolder fs-6">IDR ${(price * item.qty).toLocaleString('id-ID')}</div>
                                </div>`;
                            }).join('')}
                            
                            <button class="btn btn-success fw-bold px-4 py-2 mt-3" style="display: ${isReadyActive ? 'block' : 'none'};" onclick="removeOrder(${idx})">
                                <i class="fa-solid fa-check-circle me-2"></i>Order Collected
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }).reverse().join('');
        }

        function updateNavBadge() {
            let cart = JSON.parse(localStorage.getItem('digipharm_cart')) || [];
            let total = cart.reduce((sum, item) => sum + (parseInt(item.qty) || 0), 0);
            const badge = document.getElementById('nav-badge');
            if (badge) {
                badge.innerText = total;
                badge.style.setProperty('display', total > 0 ? 'block' : 'none', 'important');
            }
        }

        function removeOrder(idx) {
            let history = JSON.parse(localStorage.getItem('digipharm_history')) || [];
            history.splice(idx, 1); 
            localStorage.setItem('digipharm_history', JSON.stringify(history));
            renderTracking();
        }

        window.onload = function() {
            renderTracking();
            updateNavBadge();
        };

        window.addEventListener('storage', function() {
            renderTracking();
            updateNavBadge();
        });
    </script>
</body>
</html>
